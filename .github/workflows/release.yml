# 打 tag v* 或手动触发：构建 Windows 安装包 + 便携包并发布 GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export icon
        run: npm run icon:export

      - name: Build app
        run: npm run build

      - name: Package (NSIS + Portable)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        run: dir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-win-${{ github.ref_name }}
          path: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}