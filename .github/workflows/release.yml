# 打 tag v* 或手动触发：构建 Windows / macOS / Linux 安装包并发布 GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-win:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $i), retry in 20s..."
            sleep 20
          done
          exit 1

      - name: Export icon
        run: npm run icon:export

      - name: Build app
        run: npm run build

      - name: Clean dist
        run: if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Package (NSIS + Portable)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-win-${{ github.ref_name }}
          path: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            dist/*.blockmap
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $i), retry in 20s..."
            sleep 20
          done
          exit 1

      - name: Export icon
        run: npm run icon:export

      - name: Build app
        run: npm run build

      - name: Clean dist
        run: rm -rf dist

      - name: Package (DMG + ZIP)
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-mac-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $i), retry in 20s..."
            sleep 20
          done
          exit 1

      - name: Export icon
        run: npm run icon:export

      - name: Build app
        run: npm run build

      - name: Clean dist
        run: rm -rf dist

      - name: Package (AppImage + deb)
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-linux-${{ github.ref_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pi-desktop-*
          merge-multiple: true

      - name: Prepare release assets (no auto-update metadata)
        run: |
          find release-assets -type f \( -name 'latest.yml' -o -name 'latest-mac.yml' -o -name 'latest-linux.yml' \) -delete
          find release-assets -type f | sort

      - name: Generate SBOM
        run: node scripts/generate-release-sbom.mjs release-assets/sbom.cdx.json

      - name: Generate SHA256SUMS.txt
        run: node scripts/generate-release-checksums.mjs release-assets

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/**

      # Release body = 用户可读更新说明（应用内弹窗展示）。禁止仅放 CHANGELOG 链接占位。
      - name: Draft release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          if ! node scripts/generate-release-notes.mjs "$VER" > release-body.md; then
            echo "::error::CHANGELOG.md missing section for ${VER}. Add user-facing notes before tagging."
            exit 1
          fi
          if ! grep -q '[^[:space:]]' release-body.md; then
            echo "::error::Generated release body is empty"
            exit 1
          fi
          echo "Release body preview:"
          head -n 60 release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
