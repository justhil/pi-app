appId: com.pi.desktop
productName: pi Desktop
directories:
  buildResources: build
  output: dist

# Chromium UI 语言包：只保留中英（约从 42MB 降到 ~1–2MB）
# 匹配逻辑为 locale 文件 basename 精确匹配（不区分大小写），见 app-builder-lib ElectronFramework
electronLanguages:
  - en-US
  - zh-CN

files:
  - out/**/*
  - package.json
  - '!**/*.{ts,map}'
  # 依赖文档不进安装包（如 @earendil-works/pi-coding-agent/docs ~2.6MB）
  # 禁止使用 `!**/doc/**`：yaml@2 运行时需要 dist/doc/directives.js。
  # 若排除该目录，Linux/Windows asar 内 session.list / Worker init 会 MODULE_NOT_FOUND，
  # 表现为「项目还在、会话全部消失」（GitHub #21）。
  - '!**/docs/**'
  # 仅剔除已知纯文档 doc 树（非运行时）
  - '!**/bignumber.js/doc/**'
  - '!**/readable-stream/**/doc/**'

extraFiles:
  - from: build/icon.png
    to: resources/build/icon.png

# 可选：运行 scripts/fetch-codex-asr 后放入 resources/codex-asr；缺失时回退 PATH 中的 codex-asr
extraResources:
  - from: resources/codex-asr
    to: codex-asr
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

portable:
  artifactName: ${productName}-Portable-${version}-${arch}.${ext}

mac:
  target:
    - dmg
    - zip
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}
  maintainer: pi-desktop

publish:
  provider: github
  releaseType: release
