appId: com.pi.desktop
productName: pi Desktop
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/*.{ts,map}'

extraFiles:
  - from: node_modules/electron/dist/chrome_100_percent.pak
    to: chrome_100_percent.pak
  - from: node_modules/electron/dist/chrome_200_percent.pak
    to: chrome_200_percent.pak
  - from: build/icon.png
    to: resources/build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  releaseType: release
