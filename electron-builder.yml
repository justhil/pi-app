appId: com.pi.desktop
productName: pi Desktop
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/*.{ts,map}'

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  releaseType: release
